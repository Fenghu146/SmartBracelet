geng; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra libraries, extra storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32s3

[env:esp32s3]
platform = espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = 
	time
	debug
upload_speed = 115200
upload_port = COM9
board_build.flash_mode = qio
build_flags = 
	-Os
	-DLV_CONF_INCLUDE_SIMPLE
	-DCONFIG_BT_BLE_50_FEATURES_SUPPORTED=0
	-DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
	-DCONFIG_BT_NIMBLE_MAX_BONDS=1
	-DCONFIG_BT_NIMBLE_MAX_CCCDS=2
	-DCONFIG_BT_BLE_DYNAMIC_ENV_MEMORY=1
	-DCONFIG_ESP_WIFI_IRAM_OPT=0
	-DCONFIG_ESP_WIFI_RX_IRAM_OPT=0
	-DCONFIG_ESP_WIFI_EXTRA_IRAM_OPT=0
	-Iinclude
lib_extra_dirs = lib
lib_deps =
	fbiego/CST816S
	lvgl/lvgl@^8.4.0
	bblanchon/ArduinoJson @ ^7.0.0
